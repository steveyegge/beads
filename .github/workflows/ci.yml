name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Fast check to ensure all version files are in sync
  check-version-consistency:
    name: Check version consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check all versions match
        run: ./scripts/check-versions.sh

  # Fast check to catch accidental .beads/issues.jsonl changes from contributors
  check-no-beads-changes:
    name: Check for .beads changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for .beads/issues.jsonl changes
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q "^\.beads/issues\.jsonl$"; then
            echo "This PR includes changes to .beads/issues.jsonl"
            echo ""
            echo "This file is the project's issue database and should not be modified in PRs."
            echo ""
            echo "To fix, run:"
            echo "  git checkout origin/main -- .beads/issues.jsonl"
            echo "  git commit --amend"
            echo "  git push --force"
            echo ""
            exit 1
          fi
          echo "No .beads/issues.jsonl changes detected"

  # Cross-platform test matrix (Linux/macOS only - Windows uses smoke tests)
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        include:
          # Linux: full test suite with coverage
          - os: ubuntu-latest
            coverage: true
            test-flags: '-v -race -short -coverprofile=coverage.out'
          # macOS: full test suite, no coverage (faster)
          - os: macos-latest
            coverage: false
            test-flags: '-v -race -short'
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Install ICU4C (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libicu-dev

      - name: Install ICU4C (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install icu4c
          dir="$(brew --prefix icu4c)"
          echo "CGO_CPPFLAGS=-I$dir/include" >> "$GITHUB_ENV"
          echo "CGO_LDFLAGS=-L$dir/lib -Wl,-rpath,$dir/lib" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=$dir/lib/pkgconfig" >> "$GITHUB_ENV"

      - name: Configure Git
        run: |
          git config --global user.name "CI Bot"
          git config --global user.email "ci@beads.test"

      - name: Install gotestsum
        if: matrix.coverage
        run: go install gotest.tools/gotestsum@latest

      - name: Build
        run: go build -v ./cmd/bd

      - name: Test (with coverage + JUnit XML)
        if: matrix.coverage
        run: |
          gotestsum \
            --junitfile junit.xml \
            --format testdox \
            -- -race -short -coverprofile=coverage.out ./...

      - name: Test
        if: ${{ !matrix.coverage }}
        run: go test ${{ matrix.test-flags }} ./...

      - name: Upload coverage to Codecov
        if: matrix.coverage && !cancelled()
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Upload test results to Codecov
        if: matrix.coverage && !cancelled()
        uses: codecov/codecov-action@v5
        with:
          files: junit.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results
          fail_ci_if_error: false

  # Windows smoke tests only - full test suite times out (see bd-bmev)
  # Linux/macOS run comprehensive tests; Windows just verifies binary works
  #
  # ICU is NOT required on Windows:
  # - go-mysql-server's regex_pure.go (via -tags gms_pure_go) uses Go stdlib regexp
  # - go-icu-regex's regex_windows.go also uses Go stdlib regexp (build tag: windows)
  # - The only CGO deps on Windows are runtime/cgo and gozstd (bundled C source)
  test-windows:
    name: Test (Windows - smoke)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Configure Git
        run: |
          git config --global user.name "CI Bot"
          git config --global user.email "ci@beads.test"

      - name: Build (no CGO, pure Go)
        run: |
          $env:CGO_ENABLED="0"
          go build -v -tags gms_pure_go -o bd.exe ./cmd/bd

      - name: Smoke test - version
        run: ./bd.exe version

      - name: Smoke test - help
        run: ./bd.exe help

  # Narrow Linux smoke coverage for repo-local Dolt regressions.
  # Keep the full integration suite in nightly rather than broadening PR CI.
  integration-smoke:
    name: Integration Smoke (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DOLT_TEST_IMAGE: dolthub/dolt-sql-server:1.83.0
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Install ICU4C (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libicu-dev

      - name: Configure Git
        run: |
          git config --global user.name "CI Bot"
          git config --global user.email "ci@beads.test"

      - name: Pull Dolt test image
        run: docker pull "$DOLT_TEST_IMAGE"

      - name: Build smoke binary
        run: |
          echo "BD_TEST_BINARY=$RUNNER_TEMP/bd-smoke" >> "$GITHUB_ENV"
          go build -o "$RUNNER_TEMP/bd-smoke" ./cmd/bd

      - name: Run repo-local Dolt smoke
        shell: bash
        run: |
          set -euo pipefail

          cid="$(docker run -d --rm -e DOLT_ROOT_HOST=% -p 127.0.0.1::3306 "$DOLT_TEST_IMAGE")"
          tmpdir="$(mktemp -d)"
          cleanup() {
            docker rm -f "$cid" >/dev/null 2>&1 || true
            rm -rf "$tmpdir"
          }
          trap cleanup EXIT

          port="$(docker port "$cid" 3306/tcp | sed 's/.*://')"
          if [ "$port" = "3307" ]; then
            echo "expected a repo-local Dolt port, got the default 3307" >&2
            exit 1
          fi

          python3 - "$port" <<'PY'
          import socket
          import sys
          import time

          port = int(sys.argv[1])
          deadline = time.time() + 60
          while time.time() < deadline:
              try:
                  with socket.create_connection(("127.0.0.1", port), 1):
                      sys.exit(0)
              except OSError:
                  time.sleep(1)
          raise SystemExit(f"timed out waiting for Dolt test server on port {port}")
          PY

          cd "$tmpdir"
          git init >/dev/null
          git config user.email test@example.com
          git config user.name "Test User"

          export BEADS_TEST_MODE=1
          export BEADS_NO_DAEMON=1
          export BEADS_DOLT_PORT="$port"

          "$BD_TEST_BINARY" init --backend dolt --prefix bd --quiet
          printf '%s\n' "$port" > .beads/dolt-server.port

          "$BD_TEST_BINARY" create "doctor dolt smoke" --description "exercise repo-local Dolt smoke coverage" --json >/dev/null
          if [ -e .beads/beads.db ]; then
            echo "unexpected sqlite database created in dolt mode" >&2
            exit 1
          fi

          doctor_out="$("$BD_TEST_BINARY" doctor 2>&1 || true)"
          printf '%s\n' "$doctor_out"

          for forbidden in \
            "No beads.db found" \
            "Unable to read database version" \
            "Legacy database"
          do
            if grep -Fq "$forbidden" <<<"$doctor_out"; then
              echo "bd doctor reported a SQLite-only warning in Dolt mode: $forbidden" >&2
              exit 1
            fi
          done

          "$BD_TEST_BINARY" sql "UPDATE metadata SET value = '0.0.0' WHERE \`key\` = 'bd_version'"

          set +e
          health_out="$("$BD_TEST_BINARY" doctor --check-health 2>&1)"
          health_rc=$?
          set -e
          printf '%s\n' "$health_out"

          if [ "$health_rc" -eq 0 ]; then
            echo "expected bd doctor --check-health to fail on version mismatch" >&2
            exit 1
          fi
          grep -F "Version mismatch" <<<"$health_out"
          grep -F "database: 0.0.0" <<<"$health_out"

  fmt-check:
    name: Check formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Check gofmt
        run: make fmt-check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Install ICU4C (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libicu-dev

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=5m

  test-nix:
    name: Test Nix Flake
    runs-on: ubuntu-latest
    # Allow failure until nixpkgs updates Go to 1.25.6+
    # (dolthub/driver requires go 1.25.6, nixpkgs-unstable has go 1.25.1)
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Run bd help via Nix
        id: nix_help
        continue-on-error: true
        run: |
          export BEADS_DB="$PWD/.ci-beads/beads.db"
          mkdir -p "$(dirname "$BEADS_DB")"
          rm -rf .beads
          nix run .#default -- --db "$BEADS_DB" init --quiet --prefix ci
          nix run .#default -- --db "$BEADS_DB" > help.txt
      - name: Verify help text
        if: steps.nix_help.outcome == 'success'
        run: |
          FIRST_LINE=$(head -n 1 help.txt)
          EXPECTED="Issues chained together like beads. A lightweight issue tracker with first-class dependency support."
          if [ "$FIRST_LINE" != "$EXPECTED" ]; then
            echo "First line of help.txt doesn't match expected output"
            echo "Expected: $EXPECTED"
            echo "Got: $FIRST_LINE"
            exit 1
          fi
          echo "Help text first line is correct"
      - name: Note soft-failed Nix run
        if: steps.nix_help.outcome != 'success'
        run: echo "Nix run is non-blocking until nixpkgs toolchain catches up; skipping help-text assertion."
