# Step.Condition — variable-driven step inclusion.
#
# A step with `condition` is filtered out at cook time when the condition
# evaluates to false against the current variable bindings. With the
# default {{deploy}} = "false", the deploy step is excluded (2 child
# issues). Override at cook time with --var deploy=true to include it
# (3 child issues). The smoke harness exercises both branches.
formula = "condition"
description = "Step.Condition: deploy step is included only when deploy var is true."
version = 1
type = "workflow"

[vars.deploy]
description = "Whether to include the deploy step"
default = "false"

[[steps]]
id = "build"
title = "Build the project"

[[steps]]
id = "test"
title = "Run tests"
needs = ["build"]

[[steps]]
id = "deploy"
title = "Deploy to production"
needs = ["test"]
condition = "{{deploy}} == true"
